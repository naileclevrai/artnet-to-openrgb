<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenRGB Fixture Bridge</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <h1>OpenRGB Fixture Bridge</h1>
    </div>
    <div class="status-pills">
      <span id="openrgb-status" class="pill pill-off">OpenRGB</span>
      <span id="bridge-status" class="pill pill-on">Bridge</span>
      <span id="fps-status" class="pill">0 FPS</span>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar">
      <button class="nav-btn active" data-panel="setup">Setup</button>
      <button class="nav-btn" data-panel="fixtures">Fixtures</button>
      <button class="nav-btn" data-panel="editor">Patch Editor</button>
      <button class="nav-btn" data-panel="monitor">Live Monitor</button>
    </nav>

    <main class="content">
      <section id="panel-setup" class="panel active">
        <h2>Protocol &amp; Connection</h2>
        <form id="setup-form" class="form-grid">
          <label>Protocol
            <select name="protocol">
              <option value="both">Art-Net + sACN</option>
              <option value="artnet">Art-Net only</option>
              <option value="sacn">sACN only</option>
            </select>
          </label>
          <label>FPS <input name="fps" type="number" min="1" max="120" /></label>
          <label>Debug <input name="debug" type="checkbox" /></label>
          <label>OpenRGB Host <input name="openrgbHost" /></label>
          <label>OpenRGB Port <input name="openrgbPort" type="number" /></label>
          <label>Art-Net Port <input name="artnetPort" type="number" /></label>
          <label>Art-Net Universe filter <input name="artnetUniverse" placeholder="empty = all" /></label>
          <label>Art-Net Sync <input name="artnetSync" type="checkbox" /></label>
          <label>sACN Port <input name="sacnPort" type="number" /></label>
          <label>sACN Universes <input name="sacnUniverses" placeholder="1,2" /></label>
          <label>sACN Interface <input name="sacnIface" placeholder="optional IP" /></label>
        </form>
        <button id="save-setup" class="btn primary">Save &amp; Apply</button>
      </section>

      <section id="panel-fixtures" class="panel">
        <div class="panel-header">
          <h2>Fixtures</h2>
          <button id="add-fixture" class="btn primary">+ Add Fixture</button>
        </div>
        <div id="fixture-list" class="fixture-cards"></div>
      </section>

      <section id="panel-editor" class="panel">
        <div class="panel-header">
          <h2>Patch Editor</h2>
          <select id="editor-fixture-select"></select>
        </div>
        <form id="editor-form" class="form-grid">
          <label>Name <input name="name" /></label>
          <label>Device
            <select name="deviceId" id="editor-device"></select>
          </label>
          <label>Zone
            <select name="zoneId" id="editor-zone">
              <option value="">Full device</option>
            </select>
          </label>
          <label>Source
            <select name="sourceType">
              <option value="artnet">Art-Net</option>
              <option value="sacn">sACN</option>
            </select>
          </label>
          <label>Universes <input name="sourceUniverses" placeholder="1 or 1,2" /></label>
          <label>DMX Start <input name="dmxStart" type="number" min="1" /></label>
          <label>Color Order
            <select name="colorOrder">
              <option>RGB</option><option>GRB</option><option>BGR</option>
              <option>RBG</option><option>GBR</option><option>BRG</option>
            </select>
          </label>
          <label>Mapping
            <select name="mapping">
              <option value="linear">Linear</option>
              <option value="custom">Custom</option>
            </select>
          </label>
        </form>
        <div class="toolbar">
          <button id="auto-patch" class="btn">Auto-patch Linear</button>
          <button id="clear-patch" class="btn">Clear Channels</button>
          <button id="export-patch" class="btn">Export JSON</button>
          <label class="btn file-btn">Import JSON<input id="import-patch" type="file" accept=".json" hidden /></label>
          <button id="save-fixture" class="btn primary">Save Fixture</button>
        </div>
        <div class="table-wrap">
          <table class="patch-table">
            <thead>
              <tr>
                <th>LED #</th>
                <th>Name</th>
                <th>R ch</th>
                <th>G ch</th>
                <th>B ch</th>
                <th>Live</th>
              </tr>
            </thead>
            <tbody id="patch-body"></tbody>
          </table>
        </div>
      </section>

      <section id="panel-monitor" class="panel">
        <h2>Live Monitor</h2>
        <div class="monitor-grid">
          <div class="stat-card"><span class="stat-label">FPS</span><span id="mon-fps" class="stat-value">0</span></div>
          <div class="stat-card"><span class="stat-label">Packets/s</span><span id="mon-pps" class="stat-value">0</span></div>
          <div class="stat-card"><span class="stat-label">Updates</span><span id="mon-updates" class="stat-value">0</span></div>
          <div class="stat-card"><span class="stat-label">Skips</span><span id="mon-skips" class="stat-value">0</span></div>
          <div class="stat-card wide"><span class="stat-label">Last Source</span><span id="mon-source" class="stat-value">—</span></div>
          <div class="stat-card wide"><span class="stat-label">Last Universe</span><span id="mon-universe" class="stat-value">—</span></div>
          <div class="stat-card wide"><span class="stat-label">Channels 1-3</span><span id="mon-ch" class="stat-value">0, 0, 0</span></div>
        </div>
        <h3>Fixture Preview</h3>
        <div id="preview-grid" class="preview-grid"></div>
      </section>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
